  url  = "/sobre/"
  weight = 2

[[menu.main]]
  name = "Categorias"
  url  = "/categories/"
  weight = 3

[[menu.main]]
  name = "Contato"
  url  = "/contato/"
  weight = 4

[taxonomies]
