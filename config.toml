baseURL = "https://ttpap.github.io/EcoBuzios-Blog/"
languageCode = "pt-BR"
title = "EcoBuzios Blog"
theme = "circolando"
summaryLength = 40
paginate = 12

[params]
  description  = "Notícias, natureza e histórias sobre Búzios e a Região dos Lagos"
  heroTitle    = "EcoBuzios Blog"
  heroSubtitle = "Notícias, natureza e histórias sobre Búzios e a Região dos Lagos"
  email        = "contato@ecobuzios.com.br"
  author       = "EcoBuzios Blog"

[markup.goldmark.renderer]
