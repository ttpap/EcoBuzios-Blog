<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fundo preto -->
  <rect width="400" height="400" fill="#000000"/>

  <!-- Ponto laranja esquerdo (bola) -->
  <circle cx="110" cy="155" r="22" fill="#F5A623"/>

  <!-- Figura pequena do meio: circulo laranja + corpo turquesa -->
  <circle cx="185" cy="130" r="20" fill="#F5A623"/>
  <rect x="178" y="152" width="14" height="50" rx="7" fill="#00A3AD"/>
  <!-- braços pequenos -->
  <line x1="178" y1="168" x2="158" y2="180" stroke="#00A3AD" stroke-width="9" stroke-linecap="round"/>
  <line x1="192" y1="168" x2="212" y2="180" stroke="#00A3AD" stroke-width="9" stroke-linecap="round"/>
  <!-- pernas pequenas -->
  <line x1="182" y1="202" x2="172" y2="228" stroke="#00A3AD" stroke-width="9" stroke-linecap="round"/>
  <line x1="190" y1="202" x2="200" y2="228" stroke="#00A3AD" stroke-width="9" stroke-linecap="round"/>

  <!-- Figura grande à direita: circulo laranja + corpo turquesa, braços abertos -->
  <circle cx="268" cy="115" r="27" fill="#F5A623"/>
  <rect x="259" y="143" width="18" height="64" rx="9" fill="#00A3AD"/>
  <!-- braços bem abertos para cima -->
  <line x1="259" y1="162" x2="218" y2="130" stroke="#00A3AD" stroke-width="12" stroke-linecap="round"/>
  <line x1="277" y1="162" x2="318" y2="130" stroke="#00A3AD" stroke-width="12" stroke-linecap="round"/>
  <!-- pernas -->
  <line x1="264" y1="207" x2="250" y2="238" stroke="#00A3AD" stroke-width="12" stroke-linecap="round"/>
  <line x1="276" y1="207" x2="290" y2="238" stroke="#00A3AD" stroke-width="12" stroke-linecap="round"/>

  <!-- Texto ECO (turquesa) -->
  <text x="48" y="320" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="68" fill="#00A3AD" letter-spacing="2">ECO</text>
  <!-- Texto BÚZIOS (laranja) -->
  <text x="178" y="320" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="68" fill="#F5A623" letter-spacing="2">BÚZIOS</text>
</svg>
